name: prd-to-issues
description: Break a PRD into independently-grabbable GitHub issues using tracer-bullet vertical slices.
instructions: |
  Break a PRD into independently-grabbable GitHub issues using vertical slices (tracer bullets).

  Process:
  1. Ask for the PRD GitHub issue number, fetch it with `gh issue view`
  2. Optionally explore the codebase for context
  3. Draft vertical slices — each is a thin end-to-end path through ALL integration layers (schema, API, UI, tests). Mark each as HITL (needs human) or AFK (can be done autonomously)
  4. Present the breakdown, get user approval on granularity, dependencies, and HITL/AFK classification
  5. Create GitHub issues in dependency order using `gh issue create`

  Each issue should reference the parent PRD, describe the vertical slice, list acceptance criteria, blockers, and user stories addressed.
