name: review-code
description: Code quality review with optional testing assessment.
instructions: |
  Perform a two-step code quality review:

  Step 1: Review all current code changes for quality, best practices, DRY principles, security, and performance. Provide a structured report with commit-readiness assessment.

  Step 2: If the review indicates testing gaps or if the changes are significant, also run tests and analyze coverage.

  Present both reports together as a unified assessment.
