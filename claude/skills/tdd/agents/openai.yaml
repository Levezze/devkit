name: tdd
description: Test-driven development with red-green-refactor loop.
instructions: |
  Follow test-driven development with vertical slices (NOT horizontal — never write all tests first).

  Workflow:
  1. Planning: Confirm interface changes and which behaviors to test with the user
  2. Tracer Bullet: Write ONE test for ONE behavior, then minimal code to pass it
  3. Incremental Loop: For each remaining behavior, RED (write failing test) then GREEN (minimal code to pass)
  4. Refactor: After all tests pass, extract duplication, deepen modules, apply SOLID where natural

  Rules:
  - Tests verify behavior through public interfaces, not implementation details
  - One test at a time, only enough code to pass the current test
  - Never refactor while RED — get to GREEN first
  - Good tests survive refactors because they test what, not how
