name: write-a-prd
description: Create a PRD through user interview, codebase exploration, and module design, then submit as a GitHub issue.
instructions: |
  Create a Product Requirements Document through an interactive process:

  1. Ask the user for a detailed description of the problem and potential solutions
  2. Explore the repo to verify assertions and understand the current codebase state
  3. Interview the user about every aspect of the plan until shared understanding
  4. Sketch out major modules to build or modify, looking for deep modules (small interface, deep implementation)
  5. Write the PRD and submit as a GitHub issue with sections:
     - Problem Statement, Solution, User Stories, Implementation Decisions, Testing Decisions, Out of Scope, Further Notes
